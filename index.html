<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Quantum Algebraic Engine</title>
</head>
<body>
    <div class="terminal-container">
        <header>
            <h1>ALGEBRAIC ENGINE v1.0</h1>
            <div id="status">STATUS: ONLINE</div>
        </header>

        <section class="input-area">
            <input type="text" id="formula" placeholder="Enter Polynomial (e.g., 2x + 3y)">
            <input type="number" id="target" placeholder="Target Value">
            <button onclick="solve()">EXECUTE SOLVER</button>
        </section>

        <div class="main-content">
            <aside id="limits-panel">
                <h3>MARKET LIMITS</h3>
                <div id="dynamic-vars"></div>
            </aside>

            <main>
                <h3>WINNING COMBINATIONS</h3>
                <table id="results-table">
                    <thead><tr id="table-header"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
